<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UFC Fight Predictor</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0d10; color: #f2f2f2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
  h1 { font-size: 42px; margin: 0 0 12px; letter-spacing: -0.02em; }
  p  { font-size: 16px; color: #b7bcc4; margin: 6px 0; }
  .badge { display: inline-block; margin-top: 18px; padding: 8px 14px; border: 1px solid #2a2f36; border-radius: 999px; font-size: 13px; color: #d0d4da; }
  .spinner { width: 28px; height: 28px; border: 3px solid #2a2f36; border-top-color: #ff3b30;
    border-radius: 50%; animation: spin 1s linear infinite; margin: 22px auto 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>🥊 UFC Fight Predictor</h1>
      <p>Ensemble ML model — 68.45% accuracy on unseen 2023–2026 UFC fights.</p>
      <p>Starting up the Streamlit server…</p>
      <div class="spinner"></div>
      <div class="badge">This may take 20–40 seconds on cold start</div>
    </div>
  </div>
  <script>
    // Wait for Streamlit backend to be reachable, then swap this static page for it.
    (function () {
      var tries = 0;
      function ping() {
        tries++;
        fetch('/_stcore/health', { cache: 'no-store' })
          .then(function (r) { if (r.ok) window.location.replace('/'); else retry(); })
          .catch(retry);
      }
      function retry() { if (tries < 120) setTimeout(ping, 2000); }
      setTimeout(ping, 1500);
    })();
  </script>
</body>
</html>
